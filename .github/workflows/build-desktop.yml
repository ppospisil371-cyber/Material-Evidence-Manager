name: Build Desktop App (.exe)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs (api-zod)
        run: pnpm run typecheck:libs

      - name: Build renderer (React app)
        run: pnpm --filter @workspace/pripoky-app run build

      - name: Copy renderer to desktop
        shell: bash
        run: |
          mkdir -p artifacts/pripoky-desktop/renderer
          cp -r artifacts/pripoky-app/dist/. artifacts/pripoky-desktop/renderer/

      - name: Rebuild better-sqlite3 for Electron
        working-directory: artifacts/pripoky-desktop
        run: npx --yes @electron/rebuild -f -w better-sqlite3

      - name: Build Electron main process
        working-directory: artifacts/pripoky-desktop
        run: node build.mjs

      - name: Package .exe (electron-builder)
        working-directory: artifacts/pripoky-desktop
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pripojek-windows
          path: artifacts/pripoky-desktop/release/*.exe
          if-no-files-found: error
